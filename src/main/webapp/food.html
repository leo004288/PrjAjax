<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
	
	button {
			background-color: burlywood;
			color:ivory;
			border-style: none;
			border-radius: 5px;
			}
	
	ul {
		border: 1px solid burlywood;
		border-radius: 5px; 
		margin:10px;
		} 
		
	img {width:500px; height:300px;} 
	
	
</style>
</head>
<body>
	<h2>부산 맛집</h2>
	page<input type="number" id="page" value="1" min="1">
	<button>ok</button>
	<div id="output"></div>
	
	<script>
	
		const pageEl   = document.querySelector("#page")
		const btnEl    = document.querySelector("button")
		const outputEl = document.querySelector("#output")
	
		btnEl.addEventListener('click', function() {
			let url = 'http://apis.data.go.kr/6260000/FoodService/getFoodKr'
			url    += '?serviceKey=18151d56f4c325c1489ed0137f503b5cb51a30bfabd28674381d5128b7a49907'
			url    += '&numOfRows=10'
			url    += '&pageNo=' + pageEl.value
			url    += '&resultType=json' 
			
				
			fetch(url)
			.then(response => response.json())
			.then(json => {
// 				console.log(json)

				let totcnt = parseInt(json.getFoodKr.totalCount)
				let nor    = parseInt(json.getFoodKr.numOfRows)
				let mp     = Math.ceil(totcnt / nor)
				pageEl.max = mp

				let itemList   = json.getFoodKr.item
//				console.log(itemList)
				display(itemList)
			})
			.catch( error => console.log(error) )
		})
		
		function display(itemList) {
			let html  = ""
			itemList.forEach(function(item, i){
				html += `
					<ul>
						<li>콘텐츠ID     : ${item.UC_SEQ                   }</li>
						<li>콘텐츠명     : ${item.MAIN_TITLE               }</li>
						<li>구군         : ${item.GUGUN_NM                 }</li>
						<li>위도         : ${item.LAT                      }</li>
						<li>경도         : ${item.LNG                      }</li>
						<li>장소         : ${item.PLACE                    }</li>
						<li>제목         : ${item.TITLE                    }</li>
						<li>부제목       : ${item.SUBTITLE                 }</li>
						<li>주소         : ${item.ADDR1                    }</li>
						<li>주소 기타    : ${item.ADDR2                    }</li>
						<li>연락처       : ${item.CNTCT_TEL                }</li>
						<li><a href=      "${item.HOMEPAGE_URL}">homepage<a></li>
						<li>운영 및 시간 : ${item.USAGE_DAY_WEEK_AND_TIME  }</li>
						<li>대표메뉴     : ${item.RPRSNTV_MENU             }</li>
						<li><img src=     "${item.MAIN_IMG_NORMAL}">        </li>
						<li>상세내용     : ${item.ITEMCNTNTS               }</li>
					</ul>
					`
			})
			
			
			outputEl.innerHTML =html
		}
		
	</script>
</body>
</html>
