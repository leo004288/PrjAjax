<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>

</style>
<script src="https://code.jquery.com/jquery.min.js"></script>
<script>
	$(function() {
		
		$('button').on('click', function() {
			let loc = '/data/data.json'
// 			let loc = 'https://jsonplaceholder.typicode.com/posts/1'
			
			$.ajax({
				url : loc
			})
			.done(function(result) {
// 				console.log(result)
				let dataArr = result.dataList
// 				console.log(dataArr)
				let html = ''
				
// 				for (var i = 0; i < dataArr.length; i++) {
// 					let data = dataArr[i]
// 					console.log(data)
// 					html += '<div>'
// 					html += '<h2>' + data.name     + '</h2>'
// 					html += '<p>'  + data.language + '</p>'
// 					html += '<p>'  + data.age      + '</p>'
// 					html += '</div>'
// 				}
				
				$.each(dataArr, function(index, data) {
					dataArr.forEach(function() {
					html += '<div>'
					html += '<h2>' + data.name     + '</h2>'					
					html += '<p>'  + data.language + '</p>'					
					html += '<p>'  + data.age      + '</p>'					
					html += '</div>'
				    })	
				})
				
				$('#output').html(html)
			})
			.fail(function(erreor) {
				console.log(error)
			})
		})
		
	})
</script>
</head>
<body>
	<h2>JQuery Ajex 02</h2>
	<button>Get Data</button>
	<a href="/data/data.json">data.json</a>
	<div id="output"></div>
</body>
</html>
