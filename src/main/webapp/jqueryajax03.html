<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>

</style>
<script src="https://code.jquery.com/jquery.min.js"></script>
<script>

// 	$.ajax
// 	$.get
// 	$.post
// 	$.getJSON
// 	$.load

	$(function() {
		let url = 'https://jsonplaceholder.typicode.com/posts'
		let url2 = 'https://jsonplaceholder.typicode.com/posts/2'
		
		// Get Data List
		$('button').eq(0).on('click', function() {
			$.ajax({
				url : url
			})
			.done(function(posts) {
				let html = ''
				$.each(posts, function(index, post) {
					html += `
						<ul>
							<li>userId : ${post.userId}</li>
							<li>id     : ${post.id}    </li>
							<li>title  : ${post.title} </li>
							<li>body   : ${post.body}  </li>
						</ul>
					` 
				})
				$('#output').html(html)
			})
			.fail(function(error) {
				console.log(error)
			})
		}) // Get Data List
		
		// Get Data (Get)
		// PathVariable -> Get 방식
		$('button').eq(1).on('click', function() {
			$.get(url2, function(result) {
				console.log(result)
				alert(result.id)
			})
		})
		
		
	}) //
</script>
</head>
<body>
	<h2>JQuery Ajex 03</h2>
	<button>Get Data List</button>
	<button>Get Data (Get)</button>
	<div id="output"></div>
</body>
</html>
