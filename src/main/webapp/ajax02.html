<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>

</style>
<script src="https://code.jquery.com/jquery.min.js"></script>
<script>
	window.onload = function() {
		
		const btnEl = document.querySelector('#btn1')
		const div1El = document.querySelector('#div1')
		
		btnEl.addEventListener('click', function() {
			// 1. xhr 객체를 준비한다 : 0
			const xhr = new XMLHttpRequest();
			
		    // xhr.readystate
		    // 0. new XMLHttpRequest
		    // 1. open
		    // 2. send
		    // 3. 첫번째 data 가 도착한다
		    // 4. 모든 data가 도착했다
			// xhr 상태 변화 추적
			xhr.onreadystatechange = function() {
				//alert(xhr.readystate)
				if(xhr.readyState == 4) {
					if(xhr.status == 200) { // 200 : ok
						let result = xhr.responseText
						div1El.innerHTML = result
					}
				}
			}
			
			// 2. data 요청준비 - 비동기방식
			let loc = '/data/data.html'
			xhr.open('GET', loc, true)
			
			// 3. data 요청
			xhr.send()
			
			
		})
	}
</script>
</head>
<body>
	<h2>Ajax(Asynchronous JavaScript And XML)</h2>
	<p>페이지 전체를 바꾸지 않고 서버의 data를 가져온다</p>
	<p>2. XMLHttpRequest 객체</p>
	<p>비동기방식</p>
	<button id="btn1">Get data</button>
	<a href="http://localhost:8080/data/data.html">data.html</a>
	<div id="div1"></div>
</body>
</html>
